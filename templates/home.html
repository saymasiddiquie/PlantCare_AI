<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantCare AI - Disease Detection</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f9f4; font-family: 'Segoe UI', sans-serif; }
        .hero { background: #2d5a27; color: white; padding: 60px 0; border-bottom: 5px solid #a8e063; }
        .upload-card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: -30px; background: white; }
        .btn-predict { background: #2d5a27; color: white; border-radius: 25px; padding: 10px 30px; }
        .btn-predict:hover { background: #1e3d1a; color: white; }
    </style>
</head>
<body>

<div class="hero text-center">
    <h1>🌿 PlantCare AI</h1>
    <p>Upload a photo of a plant leaf to detect diseases instantly.</p>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card upload-card p-4 text-center">
                <form action="/predict" method="post" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label for="file" class="form-label fw-bold">Select Leaf Image</label>
                        <input class="form-control" type="file" name="file" id="file" required>
                    </div>
                    <button type="submit" class="btn btn-predict shadow-sm">Analyze Leaf</button>
                </form>
            </div>
            <p class="text-muted text-center mt-4 small">Trained on 87,000+ images for 38 disease classes.</p>
        </div>
    </div>
</div>

</body>
</html>
